services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kassenbuch
      POSTGRES_USER: kassenbuch
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kassenbuch"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://kassenbuch:${DB_PASSWORD}@db:5432/kassenbuch
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PORT: 3000
    networks:
      - internal

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - reverse_proxy
      - internal

volumes:
  pgdata:

networks:
  reverse_proxy:
    external: true   # vom Caddy-Compose erstellt
  internal:
    internal: true
