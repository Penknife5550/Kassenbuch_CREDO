services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kassenbuch
      POSTGRES_USER: kassenbuch
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kassenbuch"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://kassenbuch:${DB_PASSWORD:-changeme_in_production}@db:5432/kassenbuch
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret_in_production}
      NODE_ENV: production
      PORT: 3000
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8080:80"
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
